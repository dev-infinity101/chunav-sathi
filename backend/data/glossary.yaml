level: glossary
name_en: Election Glossary — Key Terms
name_hi: चुनाव शब्दावली — प्रमुख शब्द
description_en: >
  Comprehensive glossary of 45 terms used in Indian elections, covering constitutional
  bodies, procedures, documents, and electoral concepts. All definitions cite their
  legal/constitutional source.
description_hi: >
  भारतीय चुनावों में उपयोग किए जाने वाले 45 शब्दों की व्यापक शब्दावली, जिसमें
  संवैधानिक निकाय, प्रक्रियाएं, दस्तावेज और चुनावी अवधारणाएं शामिल हैं।
total_terms: 45

terms:
  - id: 1
    term: ECI
    full_form_en: Election Commission of India
    full_form_hi: भारत निर्वाचन आयोग
    explanation_en: >
      Constitutional body under Article 324 responsible for superintendence, direction, and
      control of elections to Parliament, state legislatures, and the offices of President
      and Vice President. Headed by the Chief Election Commissioner (CEC) and up to 2
      Election Commissioners. CEC can be removed only like a Supreme Court judge.
    explanation_hi: >
      अनुच्छेद 324 के तहत संवैधानिक निकाय जो संसद, राज्य विधानमंडलों और राष्ट्रपति व
      उपराष्ट्रपति के पदों के चुनावों की अधीक्षण, निर्देशन और नियंत्रण के लिए जिम्मेदार है।
    source: Article 324, Constitution of India

  - id: 2
    term: EVM
    full_form_en: Electronic Voting Machine
    full_form_hi: इलेक्ट्रॉनिक वोटिंग मशीन
    explanation_en: >
      Standalone battery-operated device with a Control Unit (with the Polling Officer) and
      Ballot Unit (in the voting compartment). Votes stored in non-networked microcontrollers.
      Manufactured by BEL and ECIL. First used nationally in 1999 elections.
    explanation_hi: >
      स्वतंत्र बैटरी-चालित उपकरण जिसमें कंट्रोल यूनिट (पोलिंग ऑफिसर के पास) और बैलट यूनिट
      (वोटिंग कक्ष में) होती है। BEL और ECIL द्वारा निर्मित। पहली बार 1999 चुनावों में
      राष्ट्रीय स्तर पर उपयोग हुई।
    source: Conducting Elections Rules

  - id: 3
    term: VVPAT
    full_form_en: Voter Verified Paper Audit Trail
    full_form_hi: वोटर वेरिफाइड पेपर ऑडिट ट्रेल
    explanation_en: >
      Printer device attached to EVM that produces a paper slip showing the voter's chosen
      candidate's name and symbol, visible through a transparent window for 7 seconds.
      Slip then drops into a sealed tamper-proof box. Mandatory since 2019 elections.
    explanation_hi: >
      EVM से जुड़ा प्रिंटर उपकरण जो मतदाता के चुने गए उम्मीदवार का नाम और चिह्न दर्शाती
      पर्ची बनाता है, जो 7 सेकंड के लिए पारदर्शी खिड़की से दिखती है। 2019 चुनावों से अनिवार्य।
    source: ECI Notification; Supreme Court order (N. Chandrasekaran v. Union of India)

  - id: 4
    term: NOTA
    full_form_en: None of the Above
    full_form_hi: इनमें से कोई नहीं
    explanation_en: >
      Option on ballot/EVM allowing voters to formally reject all candidates. Introduced by
      Supreme Court in 2013 (PUCL v. Union of India). Appears as the last option on EVM.
      NOTA votes are counted but do not affect the result — the candidate with the most
      valid votes still wins.
    explanation_hi: >
      मतपत्र/EVM पर विकल्प जो मतदाताओं को सभी उम्मीदवारों को औपचारिक रूप से अस्वीकार करने
      देता है। 2013 में सुप्रीम कोर्ट द्वारा शुरू किया गया। NOTA वोट गिने जाते हैं लेकिन
      परिणाम प्रभावित नहीं करते।
    source: PUCL v. Union of India (2013); ECI Circular

  - id: 5
    term: MCC
    full_form_en: Model Code of Conduct
    full_form_hi: आदर्श आचार संहिता
    explanation_en: >
      Guidelines issued by ECI governing conduct of parties, candidates, and government from
      election announcement to completion. No specific statutory backing but enforceable
      through IPC and other laws. Has evolved through party consensus since 1960.
    explanation_hi: >
      ECI द्वारा जारी दिशानिर्देश जो चुनाव घोषणा से समाप्ति तक दलों, उम्मीदवारों और सरकार
      के आचरण को नियंत्रित करते हैं। कोई विशिष्ट वैधानिक समर्थन नहीं लेकिन IPC के माध्यम
      से लागू करने योग्य। 1960 से दलीय सहमति के माध्यम से विकसित।
    source: ECI Guidelines; no specific statutory provision

  - id: 6
    term: Returning Officer
    full_form_en: Returning Officer (RO)
    full_form_hi: रिटर्निंग ऑफिसर (RO)
    explanation_en: >
      Senior officer (usually IAS) appointed by ECI to oversee the entire election process
      in a constituency — nominations, scrutiny, withdrawal, polling, counting, and results.
      Has quasi-judicial powers. Assisted by an Assistant Returning Officer (ARO).
    explanation_hi: >
      ECI द्वारा नियुक्त वरिष्ठ अधिकारी (आमतौर पर IAS) जो एक निर्वाचन क्षेत्र में पूरी
      चुनाव प्रक्रिया की निगरानी करता है। अर्ध-न्यायिक शक्तियां रखता है।
    source: Section 21, Representation of the People Act, 1951

  - id: 7
    term: Form 6
    full_form_en: Application for Inclusion of Name in Electoral Roll
    full_form_hi: मतदाता सूची में नाम शामिल करने के लिए आवेदन
    explanation_en: >
      Form submitted by a citizen applying to be enrolled as a voter for the first time,
      or by a person who has shifted to a new constituency. Submitted to the Electoral
      Registration Officer (ERO). Available online at voterportal.eci.gov.in.
    explanation_hi: >
      पहली बार मतदाता के रूप में नामांकन या नए निर्वाचन क्षेत्र में स्थानांतरण के लिए
      नागरिक द्वारा जमा किया गया फॉर्म।
    source: Registration of Electors Rules, 1960

  - id: 8
    term: Form 7
    full_form_en: Application for Deletion from Electoral Roll
    full_form_hi: मतदाता सूची से नाम हटाने के लिए आवेदन
    explanation_en: >
      Used to request deletion of a name from the electoral roll due to death, migration,
      or disqualification. Can also be filed as an objection to a wrongly enrolled person.
    explanation_hi: >
      मृत्यु, प्रवास, या अयोग्यता के कारण मतदाता सूची से नाम हटाने के लिए उपयोग किया जाता है।
      गलत नामांकित व्यक्ति के खिलाफ आपत्ति के रूप में भी दायर किया जा सकता है।
    source: Registration of Electors Rules, 1960

  - id: 9
    term: Form 8
    full_form_en: Application for Correction / Transposition in Electoral Roll
    full_form_hi: मतदाता सूची में सुधार/स्थानांतरण के लिए आवेदन
    explanation_en: >
      Used to correct errors in a voter's details (name, address, photo, date of birth)
      or to request transposition of the entry within the same assembly constituency
      when the voter has shifted within the constituency.
    explanation_hi: >
      मतदाता के विवरण (नाम, पता, फोटो, जन्म तिथि) में त्रुटियों को सुधारने या निर्वाचन
      क्षेत्र के भीतर स्थानांतरण के अनुरोध के लिए उपयोग किया जाता है।
    source: Registration of Electors Rules, 1960

  - id: 10
    term: EPIC
    full_form_en: Electors Photo Identity Card
    full_form_hi: निर्वाचक फोटो पहचान पत्र
    explanation_en: >
      Laminated photo ID card issued by ECI to registered voters. Also called Voter ID Card.
      Introduced in 1993. Primary identity document at polling booths. 12 alternative documents
      are accepted if EPIC is unavailable.
    explanation_hi: >
      ECI द्वारा पंजीकृत मतदाताओं को जारी लेमिनेटेड फोटो पहचान पत्र। 1993 में शुरू हुआ।
      मतदान केंद्रों पर प्राथमिक पहचान दस्तावेज।
    source: ECI; Representation of the People Act

  - id: 11
    term: ERO
    full_form_en: Electoral Registration Officer
    full_form_hi: निर्वाचन पंजीकरण अधिकारी
    explanation_en: >
      Officer (usually a Sub-Divisional Magistrate/SDM) responsible for preparing, revising,
      and maintaining the electoral roll for an assembly constituency. Citizens submit voter
      registration forms to the ERO. Supervised by the District Election Officer (DEO).
    explanation_hi: >
      विधानसभा निर्वाचन क्षेत्र की मतदाता सूची तैयार करने, संशोधित करने और बनाए रखने के
      लिए जिम्मेदार अधिकारी (आमतौर पर SDM)।
    source: Section 13B, Representation of the People Act, 1950

  - id: 12
    term: BLO
    full_form_en: Booth Level Officer
    full_form_hi: बूथ लेवल ऑफिसर
    explanation_en: >
      Government employee assigned to a specific polling booth. Maintains accuracy of the
      electoral roll at the grassroots level, conducts door-to-door verification, and is
      the first point of contact for voters seeking enrollment or corrections.
    explanation_hi: >
      एक विशिष्ट मतदान केंद्र को सौंपा गया सरकारी कर्मचारी। जमीनी स्तर पर मतदाता सूची
      की सटीकता बनाए रखता है और दरवाजे-दरवाजे सत्यापन करता है।
    source: ECI Instructions

  - id: 13
    term: DEO
    full_form_en: District Election Officer
    full_form_hi: जिला निर्वाचन अधिकारी
    explanation_en: >
      Usually the District Collector/DM. Coordinates all election-related activities in the
      district. Supervises EROs, manages polling stations, and coordinates security. Reports
      to the Chief Electoral Officer (CEO) of the state.
    explanation_hi: >
      आमतौर पर जिला कलेक्टर/DM। जिले में सभी चुनाव-संबंधी गतिविधियों का समन्वय करता है।
      ERO की निगरानी करता है, मतदान केंद्रों का प्रबंधन करता है।
    source: Section 13AA, Representation of the People Act, 1950

  - id: 14
    term: CEO
    full_form_en: Chief Electoral Officer
    full_form_hi: मुख्य निर्वाचन अधिकारी
    explanation_en: >
      Senior IAS officer designated by ECI for each state/UT. Supervises election preparation
      and conduct across the state. Acts as the principal liaison between ECI and the state
      election machinery.
    explanation_hi: >
      प्रत्येक राज्य/UT के लिए ECI द्वारा नामित वरिष्ठ IAS अधिकारी। राज्य में चुनाव तैयारी
      और आयोजन की निगरानी करता है।
    source: Section 13A, Representation of the People Act, 1950

  - id: 15
    term: FPTP
    full_form_en: First Past the Post
    full_form_hi: सर्वाधिक मत प्राप्त करने वाला जीतता है
    explanation_en: >
      India's electoral system for direct elections to Lok Sabha and Vidhan Sabhas. The
      candidate with the highest number of valid votes wins, regardless of margin or whether
      they cross 50%. Also called Simple Plurality. A candidate can win with as little as
      15–20% of votes in a multi-cornered contest.
    explanation_hi: >
      लोक सभा और विधान सभाओं के प्रत्यक्ष चुनावों के लिए भारत की चुनाव प्रणाली।
      सर्वाधिक वैध मत पाने वाला उम्मीदवार जीतता है, चाहे अंतर कितना भी कम हो।
    source: Representation of the People Act, 1951

  - id: 16
    term: Postal Ballot
    full_form_en: Postal Ballot
    full_form_hi: डाक मतपत्र
    explanation_en: >
      Facility allowing specified categories to vote by post. Eligible: service voters
      (armed forces, CAPF, government employees posted abroad), senior citizens 85+,
      persons with disabilities (40%+ disability), COVID-affected persons, and election
      duty personnel. Postal ballots are counted before EVM votes on counting day.
    explanation_hi: >
      निर्दिष्ट श्रेणियों को डाक द्वारा मतदान की सुविधा। पात्र: सेवा मतदाता (सशस्त्र बल, CAPF,
      विदेश में तैनात सरकारी कर्मचारी), 85+ वरिष्ठ नागरिक, दिव्यांगजन (40%+ अक्षमता)।
    source: Sections 60, 160 RPA 1951; Conduct of Elections Rules

  - id: 17
    term: RPA 1951
    full_form_en: Representation of the People Act, 1951
    full_form_hi: जन प्रतिनिधित्व अधिनियम, 1951
    explanation_en: >
      Primary legislation governing elections to Parliament and state legislatures. Covers
      qualification and disqualification of candidates, corrupt practices, election offences,
      election petitions, and bye-elections. Companion Act: RPA 1950 (electoral rolls).
    explanation_hi: >
      संसद और राज्य विधानमंडलों के चुनावों को नियंत्रित करने वाला प्राथमिक कानून।
      उम्मीदवारों की योग्यता और अयोग्यता, भ्रष्ट आचरण, चुनाव अपराध, चुनाव याचिकाएं शामिल हैं।
    source: Parliament of India

  - id: 18
    term: RPA 1950
    full_form_en: Representation of the People Act, 1950
    full_form_hi: जन प्रतिनिधित्व अधिनियम, 1950
    explanation_en: >
      Governs the preparation and revision of electoral rolls for parliamentary and assembly
      constituencies. Defines voter eligibility, delimitation procedure, and the roles of
      EROs and BLOs.
    explanation_hi: >
      संसदीय और विधानसभा निर्वाचन क्षेत्रों के लिए मतदाता सूची तैयार करने और संशोधन को
      नियंत्रित करता है।
    source: Parliament of India

  - id: 19
    term: Delimitation Commission
    full_form_en: Delimitation Commission
    full_form_hi: परिसीमन आयोग
    explanation_en: >
      Statutory body constituted by the President under the Delimitation Act. Fixes boundaries
      and number of parliamentary and assembly constituencies after each Census. Orders of the
      Delimitation Commission are final and cannot be questioned in any court. Last delimitation
      was in 2002–2008 (based on 2001 Census).
    explanation_hi: >
      परिसीमन अधिनियम के तहत राष्ट्रपति द्वारा गठित वैधानिक निकाय। प्रत्येक जनगणना के बाद
      संसदीय और विधानसभा निर्वाचन क्षेत्रों की सीमाएं और संख्या तय करता है।
    source: Delimitation Act; Articles 82, 170 Constitution of India

  - id: 20
    term: Election Observer
    full_form_en: Election Observer
    full_form_hi: चुनाव प्रेक्षक
    explanation_en: >
      Senior officers (IAS/IPS) deployed by ECI in constituencies to monitor election conduct.
      Categories: General Observer (overall conduct), Police Observer (law and order),
      Expenditure Observer (candidate spending). Report directly to ECI and can take
      corrective action including recommending countermanding of poll.
    explanation_hi: >
      ECI द्वारा निर्वाचन क्षेत्रों में तैनात वरिष्ठ अधिकारी। श्रेणियां: सामान्य प्रेक्षक,
      पुलिस प्रेक्षक, व्यय प्रेक्षक। ECI को सीधे रिपोर्ट करते हैं।
    source: ECI Guidelines

  - id: 21
    term: Presiding Officer
    full_form_en: Presiding Officer
    full_form_hi: पीठासीन अधिकारी
    explanation_en: >
      Officer in charge of a polling station on polling day. Responsible for maintaining
      order, conducting mock poll, managing the EVM, ensuring voter identification, and
      sealing the EVM at close of poll. Appointed by the District Election Officer.
    explanation_hi: >
      मतदान दिवस पर मतदान केंद्र के प्रभारी अधिकारी। व्यवस्था बनाए रखना, मॉक पोल
      करना, EVM प्रबंधित करना, मतदाता पहचान सुनिश्चित करना जिम्मेदारी है।
    source: Section 26, Representation of the People Act, 1951

  - id: 22
    term: Polling Agent
    full_form_en: Polling Agent
    full_form_hi: मतदान एजेंट
    explanation_en: >
      A representative appointed by a candidate to be present at the polling station to
      observe the voting process, challenge voter identity, and report irregularities.
      Each candidate can appoint one polling agent per polling station.
    explanation_hi: >
      उम्मीदवार द्वारा मतदान केंद्र पर मतदान प्रक्रिया देखने, मतदाता पहचान को चुनौती देने
      और अनियमितताएं रिपोर्ट करने के लिए नियुक्त प्रतिनिधि।
    source: Section 46, Representation of the People Act, 1951

  - id: 23
    term: Counting Agent
    full_form_en: Counting Agent
    full_form_hi: मतगणना एजेंट
    explanation_en: >
      A representative appointed by a candidate to be present at the counting centre during
      vote counting. Can observe the counting process and raise objections. One counting
      agent per counting table per candidate.
    explanation_hi: >
      मतगणना केंद्र पर मतगणना के दौरान उम्मीदवार द्वारा नियुक्त प्रतिनिधि।
    source: Section 47, Representation of the People Act, 1951

  - id: 24
    term: Election Petition
    full_form_en: Election Petition
    full_form_hi: चुनाव याचिका
    explanation_en: >
      Legal challenge to an election result, filed in the concerned High Court within 45 days
      of result declaration. Grounds: corrupt practice, disqualification of winning candidate,
      or irregularities. The High Court's order can be appealed to the Supreme Court.
    explanation_hi: >
      परिणाम घोषणा के 45 दिनों के भीतर संबंधित उच्च न्यायालय में दायर चुनाव परिणाम को
      कानूनी चुनौती।
    source: Part VI (Sections 80–122), Representation of the People Act, 1951

  - id: 25
    term: Corrupt Practice
    full_form_en: Corrupt Practice (Election)
    full_form_hi: भ्रष्ट आचरण (चुनाव)
    explanation_en: >
      Offences listed under Section 123 of RPA 1951 that can void an election. Includes
      bribery (offering money/gifts for votes), undue influence, appeal on grounds of
      religion/caste/community, hiring vehicles for voters, and propagating false statements
      about a candidate.
    explanation_hi: >
      RPA 1951 की धारा 123 के तहत सूचीबद्ध अपराध जो चुनाव को रद्द कर सकते हैं।
      इसमें रिश्वत, अनुचित प्रभाव, धर्म/जाति/समुदाय के आधार पर अपील, मतदाताओं के लिए
      वाहन किराए पर लेना शामिल है।
    source: Section 123, Representation of the People Act, 1951

  - id: 26
    term: Booth Capturing
    full_form_en: Booth Capturing
    full_form_hi: बूथ कैप्चरिंग
    explanation_en: >
      Seizure of a polling station to stuff ballot boxes or intimidate voters. Cognizable
      and non-bailable offence under Section 135A of RPA 1951, punishable with 1–3 years
      imprisonment. If booth capturing occurs, the Presiding Officer or Observer can
      order polling stopped.
    explanation_hi: >
      मतपत्र बक्से भरने या मतदाताओं को डराने के लिए मतदान केंद्र पर कब्जा करना।
      RPA 1951 की धारा 135A के तहत संज्ञेय और गैर-जमानती अपराध।
    source: Section 135A, Representation of the People Act, 1951

  - id: 27
    term: Anti-Defection Law
    full_form_en: Anti-Defection Law (Tenth Schedule)
    full_form_hi: दल-बदल विरोधी कानून (दसवीं अनुसूची)
    explanation_en: >
      Inserted by the 52nd Constitutional Amendment Act, 1985. Disqualifies an MP or MLA
      who voluntarily gives up party membership or votes against party direction. The
      Speaker (Lok Sabha) or Chairman (Rajya Sabha) decides; subject to judicial review.
      Does not apply to independent members or if 2/3rd of party merges with another.
    explanation_hi: >
      52वें संवैधानिक संशोधन अधिनियम, 1985 द्वारा सम्मिलित। उस सांसद या विधायक को
      अयोग्य घोषित करता है जो स्वेच्छा से दल की सदस्यता छोड़ता है या दल के निर्देश के
      विरुद्ध मतदान करता है।
    source: Tenth Schedule, Constitution of India (52nd Amendment, 1985)

  - id: 28
    term: Whip
    full_form_en: Party Whip
    full_form_hi: पार्टी व्हिप
    explanation_en: >
      An official direction issued by a political party to its legislators on how to vote on
      a specific matter. A three-line whip is the most binding; voting against it without
      prior dispensation can invoke the Anti-Defection Law. The party official who issues
      this is also called the 'Whip.'
    explanation_hi: >
      किसी विशिष्ट मामले पर कैसे मतदान करना है, इस पर राजनीतिक दल द्वारा अपने विधायकों
      को जारी आधिकारिक निर्देश। थ्री-लाइन व्हिप सबसे बाध्यकारी है।
    source: Tenth Schedule (contextually)

  - id: 29
    term: Rajya Sabha
    full_form_en: Rajya Sabha (Council of States)
    full_form_hi: राज्य सभा (राज्यों की परिषद)
    explanation_en: >
      Upper house of Indian Parliament. Members elected indirectly by elected MLAs of state
      assemblies through Single Transferable Vote. Permanent house — cannot be dissolved.
      One-third members retire every 2 years. 250 members (238 elected + 12 nominated by
      President). Minimum age to contest: 30 years.
    explanation_hi: >
      भारतीय संसद का ऊपरी सदन। राज्य विधानसभाओं के निर्वाचित MLA द्वारा एकल हस्तांतरणीय
      मत से अप्रत्यक्ष रूप से निर्वाचित। स्थायी सदन — भंग नहीं किया जा सकता।
    source: Articles 80–88, Constitution of India

  - id: 30
    term: Vidhan Sabha
    full_form_en: Vidhan Sabha (State Legislative Assembly)
    full_form_hi: विधान सभा (राज्य विधान सभा)
    explanation_en: >
      Lower house (or only house) of each state legislature. Members directly elected by voters
      from assembly constituencies. 5-year term. Forms state government after elections.
      Seats range from 32 (Sikkim) to 403 (UP).
    explanation_hi: >
      प्रत्येक राज्य विधानमंडल का निचला सदन (या एकमात्र सदन)। सदस्य विधानसभा निर्वाचन
      क्षेत्रों से मतदाताओं द्वारा सीधे चुने जाते हैं। 5 वर्ष का कार्यकाल।
    source: Articles 168–212, Constitution of India

  - id: 31
    term: By-Election
    full_form_en: By-Election (Bye-Poll)
    full_form_hi: उप-चुनाव
    explanation_en: >
      Election held to fill a single vacancy in a legislature caused by death, resignation,
      disqualification, or court order. Must be held within 6 months of the vacancy, unless
      less than 1 year remains in the term of the House.
    explanation_hi: >
      मृत्यु, इस्तीफे, अयोग्यता, या अदालती आदेश के कारण विधानमंडल में एकल रिक्ति भरने
      के लिए आयोजित चुनाव।
    source: Section 151A, Representation of the People Act, 1951

  - id: 32
    term: Presiding Officer (Counting)
    full_form_en: Counting Supervisor / Counting Assistant
    full_form_hi: मतगणना पर्यवेक्षक / मतगणना सहायक
    explanation_en: >
      Officials assigned to counting tables to conduct the actual counting of votes from EVM
      ballot units under the supervision of the Returning Officer or an ARO.
    explanation_hi: >
      रिटर्निंग ऑफिसर या ARO की निगरानी में EVM बैलट यूनिट से वोटों की वास्तविक गिनती
      करने के लिए गिनती टेबल पर नियुक्त अधिकारी।
    source: Conduct of Elections Rules, 1961

  - id: 33
    term: Paid News
    full_form_en: Paid News
    full_form_hi: पेड न्यूज़
    explanation_en: >
      Publication or broadcast of content which appears to be news but is in fact paid political
      advertisement without disclosure. ECI's Media Certification and Monitoring Committee (MCMC)
      monitors and can direct inclusion of such expenditure in the candidate's account.
    explanation_hi: >
      ऐसी सामग्री का प्रकाशन या प्रसारण जो समाचार जैसी लगती है लेकिन वास्तव में बिना
      प्रकटीकरण के भुगतान किया गया राजनीतिक विज्ञापन है।
    source: ECI Guidelines; MCC

  - id: 34
    term: MCMC
    full_form_en: Media Certification and Monitoring Committee
    full_form_hi: मीडिया प्रमाणन एवं निगरानी समिति
    explanation_en: >
      Committee constituted at district and state levels by ECI to certify political
      advertisements before broadcast, and monitor paid news. All political ads on
      electronic media must receive MCMC pre-certification.
    explanation_hi: >
      प्रसारण से पहले राजनीतिक विज्ञापनों को प्रमाणित करने और पेड न्यूज़ की निगरानी के
      लिए ECI द्वारा जिला और राज्य स्तर पर गठित समिति।
    source: ECI Instructions; Section 127A RPA 1951

  - id: 35
    term: SVEEP
    full_form_en: Systematic Voters' Education and Electoral Participation
    full_form_hi: व्यवस्थित मतदाता शिक्षा और निर्वाचन भागीदारी
    explanation_en: >
      ECI's flagship programme for voter education and awareness, aimed at increasing voter
      turnout especially among first-time voters, youth, women, urban voters, and persons
      with disabilities. Involves campaigns, pledges, apps, and outreach activities.
    explanation_hi: >
      मतदाता शिक्षा और जागरूकता के लिए ECI का प्रमुख कार्यक्रम, विशेष रूप से पहली बार
      मतदाताओं, युवाओं, महिलाओं और दिव्यांगजनों के बीच मतदाता भागीदारी बढ़ाने के लिए।
    source: ECI

  - id: 36
    term: Voter Helpline
    full_form_en: National Voter Helpline
    full_form_hi: राष्ट्रीय मतदाता हेल्पलाइन
    explanation_en: >
      ECI's toll-free helpline number 1950 for voter registration, polling station lookup,
      and election-related complaints. Also available via the Voter Helpline mobile app.
    explanation_hi: >
      मतदाता पंजीकरण, मतदान केंद्र खोज और चुनाव-संबंधी शिकायतों के लिए ECI की
      टोल-फ्री हेल्पलाइन नंबर 1950।
    source: ECI

  - id: 37
    term: C-Vigil
    full_form_en: C-Vigil App
    full_form_hi: C-Vigil ऐप
    explanation_en: >
      ECI's mobile app allowing citizens to report MCC violations, distribution of freebies,
      and other election irregularities by uploading photos and videos. Reports are directed
      to the flying squad in real-time, with a 100-minute resolution target.
    explanation_hi: >
      नागरिकों को MCC उल्लंघन, मुफ्त उपहार वितरण और अन्य चुनाव अनियमितताओं की
      फोटो और वीडियो अपलोड करके रिपोर्ट करने की सुविधा देने वाला ECI का मोबाइल ऐप।
    source: ECI

  - id: 38
    term: Flying Squad
    full_form_en: Flying Squad
    full_form_hi: फ्लाइंग स्क्वाड
    explanation_en: >
      Mobile vigilance teams deployed during elections to respond to complaints (especially
      via C-Vigil app) about distribution of cash, liquor, and other inducements. Consists
      of a magistrate, police personnel, videographer, and income tax officials.
    explanation_hi: >
      चुनावों के दौरान नकद, शराब और अन्य प्रलोभनों के वितरण की शिकायतों पर त्वरित
      प्रतिक्रिया के लिए तैनात मोबाइल निगरानी टीमें।
    source: ECI Instructions

  - id: 39
    term: Strong Room
    full_form_en: Strong Room (EVM Storage)
    full_form_hi: स्ट्रॉन्ग रूम (EVM भंडारण)
    explanation_en: >
      A secured and sealed room where EVMs are stored between polling day and counting day.
      Sealed with multi-party seals and guarded 24×7 by CAPF/police. Candidates and their
      agents can stand outside the strong room and observe. Webcasting is done.
    explanation_hi: >
      एक सुरक्षित और सील कक्ष जहां मतदान दिवस और मतगणना दिवस के बीच EVM संग्रहीत की
      जाती हैं। बहु-पक्षीय मुहरों से सील और 24×7 CAPF/पुलिस द्वारा रक्षित।
    source: ECI Instructions

  - id: 40
    term: SEC
    full_form_en: State Election Commission
    full_form_hi: राज्य चुनाव आयोग
    explanation_en: >
      Constitutional body under Article 243K (for Panchayat elections) and Article 243ZA
      (for urban local body elections). Independent of ECI. Each state has its own SEC.
      The State Election Commissioner has security of tenure similar to a High Court judge.
    explanation_hi: >
      अनुच्छेद 243K (पंचायत चुनावों के लिए) और अनुच्छेद 243ZA (शहरी स्थानीय निकाय
      चुनावों के लिए) के तहत संवैधानिक निकाय। ECI से स्वतंत्र।
    source: Articles 243K, 243ZA, Constitution of India

  - id: 41
    term: President Rule
    full_form_en: President's Rule (State Emergency)
    full_form_hi: राष्ट्रपति शासन (राज्य आपातकाल)
    explanation_en: >
      Provision under Article 356 allowing the President to assume governance of a state if
      the state cannot be governed according to the Constitution (on Governor's report or
      otherwise). Must be approved by Parliament within 2 months. Maximum duration 3 years.
    explanation_hi: >
      अनुच्छेद 356 के तहत प्रावधान जो राष्ट्रपति को राज्य के संविधान के अनुसार शासन न
      कर पाने पर राज्य का शासन संभालने की अनुमति देता है।
    source: Article 356, Constitution of India

  - id: 42
    term: Gram Sabha
    full_form_en: Gram Sabha
    full_form_hi: ग्राम सभा
    explanation_en: >
      Body consisting of all registered voters of a Gram Panchayat area. The foundational
      democratic unit at village level under Article 243A. Must meet at least twice a year.
      Reviews Gram Panchayat's annual accounts, approves plans, and identifies scheme beneficiaries.
    explanation_hi: >
      ग्राम पंचायत क्षेत्र के सभी पंजीकृत मतदाताओं से बना निकाय। अनुच्छेद 243A के तहत
      ग्राम स्तर पर मूलभूत लोकतांत्रिक इकाई।
    source: Article 243A, Constitution of India

  - id: 43
    term: Sarpanch
    full_form_en: Sarpanch (Village Head)
    full_form_hi: सरपंच (ग्राम प्रधान)
    explanation_en: >
      Elected head of the Gram Panchayat. In many states, elected directly by all voters of
      the GP. In some states, elected indirectly by ward members. Also called Pradhan (UP, Bihar),
      Mukhiya (Bihar), President (Tamil Nadu, AP). Subject to recall provisions in some states.
    explanation_hi: >
      ग्राम पंचायत का निर्वाचित प्रमुख। कई राज्यों में, GP के सभी मतदाताओं द्वारा सीधे
      चुना जाता है। UP में प्रधान, बिहार में मुखिया भी कहते हैं।
    source: State Panchayati Raj Acts

  - id: 44
    term: Zilla Parishad
    full_form_en: Zilla Parishad (District Council)
    full_form_hi: जिला परिषद
    explanation_en: >
      The highest tier of Panchayati Raj at the district level. Members directly elected from
      territorial constituencies in the district. Manages district-level development planning,
      implementation of state schemes, and coordinates Panchayat Samitis and Gram Panchayats.
    explanation_hi: >
      जिला स्तर पर पंचायती राज का उच्चतम स्तर। जिले के प्रादेशिक निर्वाचन क्षेत्रों से
      सीधे चुने गए सदस्य। जिला स्तरीय विकास योजना का प्रबंधन करता है।
    source: Part IX, Constitution of India; State Panchayati Raj Acts

  - id: 45
    term: Voter Portal
    full_form_en: National Voter Services Portal (NVSP)
    full_form_hi: राष्ट्रीय मतदाता सेवा पोर्टल
    explanation_en: >
      ECI's online portal (voterportal.eci.gov.in) providing services including: voter
      registration (Form 6/7/8), electoral roll search, polling station lookup, EPIC download,
      candidate affidavit viewing, and election results. Mobile app: Voter Helpline (1950).
    explanation_hi: >
      ECI का ऑनलाइन पोर्टल (voterportal.eci.gov.in) जो सेवाएं प्रदान करता है: मतदाता
      पंजीकरण (फॉर्म 6/7/8), मतदाता सूची खोज, मतदान केंद्र खोज, EPIC डाउनलोड।
    source: ECI
